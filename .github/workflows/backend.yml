name: Backend Tests & Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'careerlens-backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'careerlens-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: careerlens_test
        options: >-
          --health-cmd = "mysqladmin ping"
          --health-interval = 10s
          --health-timeout = 5s
          --health-retries = 3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        cd careerlens-backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with flake8
      run: |
        cd careerlens-backend
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Run tests
      env:
        DATABASE_URL: mysql+pymysql://root:test_root@127.0.0.1:3306/careerlens_test
      run: |
        cd careerlens-backend
        pytest tests/ -v --cov=app --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./careerlens-backend/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend image
      uses: docker/build-push-action@v4
      with:
        context: ./careerlens-backend
        push: false
        tags: careerlens-backend:latest
