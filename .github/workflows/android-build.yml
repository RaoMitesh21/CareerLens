name: Build Android Release

on:
  push:
    branches:
      - main
      - hotfix-auth-email
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Install Frontend Dependencies
        working-directory: ./careerlens-frontend
        run: npm install
        
      - name: Build Web App and Sync to Android
        working-directory: ./careerlens-frontend
        run: npm run build:android
        
      - name: Decode Keystore
        working-directory: ./careerlens-frontend/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 --decode > upload-keystore.jks
        
      - name: Build Release Bundle
        working-directory: ./careerlens-frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: careerlens-release
          path: ./careerlens-frontend/android/app/build/outputs/bundle/release/app-release.aab
