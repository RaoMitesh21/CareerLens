name: Build Android Release

on:
  push:
    branches:
      - main
      - hotfix-auth-email
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      
      - name: Install Frontend Dependencies
        working-directory: ./careerlens-frontend
        run: npm install
        
      - name: Build Web App and Sync to Android
        working-directory: ./careerlens-frontend
        run: npm run build:android
        
      - name: Decode Keystore
        working-directory: ./careerlens-frontend/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks
        
      - name: Build Release Bundle & APK
        working-directory: ./careerlens-frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: "careerlens123"
          KEY_ALIAS: "upload"
          KEY_PASSWORD: "careerlens123"
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease
          ./gradlew assembleRelease

      - name: Upload Android App Bundle (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: careerlens-aab
          path: ./careerlens-frontend/android/app/build/outputs/bundle/release/app-release.aab
          
      - name: Upload Installable APK (For Free Distribution)
        uses: actions/upload-artifact@v4
        with:
          name: careerlens-apk
          path: ./careerlens-frontend/android/app/build/outputs/apk/release/app-release.apk
