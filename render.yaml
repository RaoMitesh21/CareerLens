services:
  - type: web
    name: careerlens-api
    runtime: python-3.11
    rootDir: careerlens-backend
    buildCommand: sh -c 'if [ -d careerlens-backend ]; then cd careerlens-backend; fi; pip install --upgrade pip && pip install -r requirements.txt'
    startCommand: sh -c 'if [ -d careerlens-backend ]; then cd careerlens-backend; fi; PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: 1
      - key: RENDER_PYTHON_VERSION
        value: 3.11
      - key: TURSO_DB_NAME
        value: careerlens-v2
      - key: TURSO_CONNECTION_URL
        sync: false
